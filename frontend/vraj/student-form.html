<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <img src="logo.png" class="img2 d-block mx-auto mb-4" alt="FutureSkills Logo">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: White;
      /* Light blue similar to FutureSkills */
      padding: 40px;
    }

    .form-container {
      background-color: rgba(255, 136, 0, 0.882);
      padding: 30px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #002b45;
      /* Dark blue like FutureSkills logo */
      font-weight: bold;
    }

    .form-label {
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="form-container">
    <h2>Student Registration Form</h2>
    <form id="registrationForm">
      <div class="mb-3">
        <label for="attending" class="form-label">Attending</label>
        <select class="form-select" id="attending">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="guests" class="form-label">Number of Guests</label>
        <input type="number" class="form-control" id="guests" min="0">
      </div>
      <div class="mb-3">
        <label for="food" class="form-label">Food Preferences</label>
        <input type="text" class="form-control" id="food_preference" placeholder="e.g., Vegetarian, Halal">
      </div>

      <input type="hidden" id="student_id" name="student_id">

      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
  </div>
  <script>
    // Функция для получения ID из URL: ?student_id=1001
    function getStudentIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('student_id');
    }

    // Когда страница загрузилась — вставить ID в скрытое поле
    document.addEventListener('DOMContentLoaded', () => {
      const studentId = getStudentIdFromURL();

      if (studentId) {
        document.getElementById('student_id').value = studentId;
      } else {
        alert("❌ Student ID not found in URL.");
      }
    });
  </script>
  <script>
    document.getElementById('registrationForm').addEventListener('submit', async function (e) {
      e.preventDefault(); // Не перезагружаем страницу

      // Собираем данные из формы
      const student_id = document.getElementById('student_id').value;
      const attendingRaw = document.getElementById('attending').value;
      const attending = attendingRaw === "Yes"; // 'Yes' => true, 'No' => false
      const guests = document.getElementById('guests').value;
      const food_preference = document.getElementById('food_preference').value;

      try {
        const res = await fetch('http://localhost:3000/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            student_id,
            attending,
            guests,
            food_preference
          })
        });

        const result = await res.json();

        if (res.ok) {
          alert('✅ Form submitted successfully!');
        } else {
          alert(result.error || '❌ Submission failed');
        }

      } catch (error) {
        console.error('🚨 Submit error:', error);
        alert('Server error');
      }
    });
  </script>
</body>

</html>
