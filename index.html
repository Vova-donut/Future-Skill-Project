<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
   <img src="images/logo.png" class="img2 d-block mx-auto mb-4" alt="FutureSkills Logo">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-color: White; /* Light blue similar to FutureSkills */
        padding: 40px;
      }
      .form-container {
        background-color: rgba(255, 136, 0, 0.882);
        padding: 30px;
        border-radius: 10px;
        max-width: 700px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
      h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #002b45; /* Dark blue like FutureSkills logo */
        font-weight: bold;
      }
     .form-label {
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Student Registration Form</h2>
      <form>
      <div class="mb-3">
        <label for="student_id" class="form-label">Student ID</label>
        <input type="text" class="form-control" id="student_id" placeholder="Enter student ID">
      </div>
      <div class="mb-3">
        <label for="firstname" class="form-label">Firstname</label>
        <input type="text" class="form-control" id="firstname" placeholder="Firstname">
      </div>
      <div class="mb-3">
        <label for="middlename" class="form-label">Middlename</label>
        <input type="text" class="form-control" id="middlename" placeholder="Middlename">
      </div>
      <div class="mb-3">
        <label for="lastname" class="form-label">Lastname</label>
        <input type="text" class="form-control" id="lastname" placeholder="Lastname">
      </div>
      <div class="mb-3">
        <label for="course" class="form-label">Course</label>
        <select class="form-select" id="course">
          <option selected disabled>Choose a course</option>
          <option value="IT">Information Technology</option>
          <option value="Business">Business</option>
          <option value="Design">Design</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="faculty" class="form-label">Faculty</label>
        <input type="text" class="form-control" id="faculty" placeholder="Enter faculty name">
      </div>
      <div class="mb-3">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="male" value="male">
          <label class="form-check-label" for="male">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="female" value="female">
          <label class="form-check-label" for="female">Female</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="other" value="other">
          <label class="form-check-label" for="other">Other</label>
        </div>
      </div>
      <div class="mb-3">
        <label for="attending" class="form-label">Attending</label>
        <select class="form-select" id="attending">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="guests" class="form-label">Number of Guests</label>
        <input type="number" class="form-control" id="guests" min="0">
      </div>
      <div class="mb-3">
        <label for="food" class="form-label">Food Preferences</label>
        <input type="text" class="form-control" id="food" placeholder="e.g., Vegetarian, Halal">
      </div>
      <div class="mb-3">
        <label for="submission_time" class="form-label">Submission Date/Time</label>
        <input type="datetime-local" class="form-control" id="submission_time">
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
      </form>
    </div>
  </body>
</html>
