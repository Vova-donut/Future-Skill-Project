<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: White;
      padding: 40px;
    }
    .form-container {
      background-color: rgba(255, 136, 0, 0.882);
      padding: 30px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #002b45;
      font-weight: bold;
    }
    .form-label {
      font-weight: 500;
    }
    .img2 {
      display: block;
      margin: 0 auto 30px;
      max-width: 200px;
    }
  </style>
</head>
<body>
  <img src="/images2/future-skillslogo.png" class="img2" alt="FutureSkills Logo">

  <div class="form-container">
    <h2>Student Registration Form</h2>
    <form id="userForm" method="POST">
  
      <input type="text" id="student_id" name="student_id">

      <div class="mb-3">
        <label for="firstname" class="form-label">Firstname</label>
        <input type="text" class="form-control" id="firstname" name="firstname" placeholder="Firstname">
      </div>
      <div class="mb-3">
        <label for="middlename" class="form-label">Middlename</label>
        <input type="text" class="form-control" id="middlename" name="middlename" placeholder="Middlename">
      </div>
      <div class="mb-3">
        <label for="lastname" class="form-label">Lastname</label>
        <input type="text" class="form-control" id="lastname" name="lastname" placeholder="Lastname">
      </div>
      <div class="mb-3">
        <label for="course" class="form-label">Course</label>
        <select class="form-select" id="course" name="course" disabled>
          <option selected disabled>Choose a course</option>
          <option value="IT">Information Technology</option>
          <option value="Business">Business</option>
          <option value="Design">Design</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="faculty" class="form-label">Faculty</label>
        <input type="text" class="form-control" id="faculty" name="faculty" placeholder="Enter faculty name">
      </div>
      <div class="mb-3">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="male" value="male">
          <label class="form-check-label" for="male">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="female" value="female">
          <label class="form-check-label" for="female">Female</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="other" value="other">
          <label class="form-check-label" for="other">Other</label>
        </div>
      </div>
      <div class="mb-3">
        <label for="attending" class="form-label">Attending</label>
        <select class="form-select" id="attending" name="attending">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="guests" class="form-label">Number of Guests</label>
        <input type="number" class="form-control" id="guests" name="guests" min="0">
      </div>
      <div class="mb-3">
        <label for="food" class="form-label">Food Preferences</label>
        <input type="text" class="form-control" id="food" name="food" placeholder="e.g., Vegetarian, Halal">
      </div>
      <div class="mb-3">
        <label for="submission_time" class="form-label">Submission Time</label>
        <input type="datetime-local" class="form-control" id="submission_time" name="submission_time">
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
