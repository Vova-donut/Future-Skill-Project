<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Future Skills Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      overflow: hidden;
      background-color: #ffffff;
    }

    .left {
      width: 50%;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right {
      width: 50%;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .logo {
      width: 150px;
      margin-bottom: 20px;
    }

    h2 {
      color:orange;
      margin-bottom: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 300px;
      margin-top: 20px;
    }

    form input {
      padding: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    form button {
      background-color: #004AAD;
      color: white;
      padding: 10px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    form button:hover {
      background-color: #003380;
    }

    a {
      margin-top: 10px;
      color: #004AAD;
      text-decoration: none;
      font-size: 14px;
    }

    .support {
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="left">
      <img src="images2/background.jpg" alt="Graduation">
    </div>
    <div class="right">
      <img src="images2\future-skillslogo.png" alt="Future Skills Logo" class="logo">
      <h2>FUTURE SKILLS</h2>
      <p>Enter your network or Moodle username and password</p>
      <form>
      <input type="text" name="username" placeholder="Example: MUSKAN01" required>
      <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign in</button>
      </form>
      <a href="#">Can't access your account?</a>
      <div class="support">
        <p>If you need assistance:</p>
        <ul>
          <li>P: 0800 FUTURE (0800 388 873)</li>
          <li>E: support@futureskills.ac.nz</li>
        </ul>
      </div>
    </div>
  </div>
</body>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.querySelector('form');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = form.querySelector('input[name="username"]').value;
    const password = form.querySelector('input[name="password"]').value;

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.redirected) {
        window.location.href = res.url;
      } else {
        const error = await res.text();
        alert(error);
      }
    } catch (err) {
      alert('Login failed.');
      console.error(err);
    }
  });
});
</script>

</html>
